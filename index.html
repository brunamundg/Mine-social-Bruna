<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
      <img src="https://chatgpt.com/backend-api/estuary/content?id=file_00000000ddd471f59e26f2cd563cf108&ts=492713&p=fs&cid=1&sig=6913cc64e70af9d639a69beb04abe36223bea43467ca907b47fcf8698033a630&v=0" class="avatar">
      <div>
        <span class="name">B.Dias</span>
        <span class="username">@bruna_mlks</span>
      </div>
    </div>

    <p class="post-text">
      Eu tentei ser paciente… mas as pessoas realmente dificultam.
    </p>

    <div class="post-actions">
      <button id="likeBtn">Curtir</button>
      <span id="likeCount">0</span>
    </div>

    <section class="comments">
      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>Eu não tenho problema com pessoas… só com as coisas que elas fazem.</p>
      </div>

      <div class="comment">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQQbafZwjf4sXrtygrLpY8ECd5zIusu3-y6hg&s" class="avatar-small">
        <p>Eu acredito no melhor das pessoas, mas às vezes elas provam o contrário.</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
